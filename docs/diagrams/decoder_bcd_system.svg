<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <style>
      .wire { stroke: #334155; stroke-width: 2; fill: none; }
      .box  { stroke: #1f2937; stroke-width: 2; fill: #f8fafc; }
      .chip { stroke: #1f2937; stroke-width: 2.5; fill: #eef2f7; rx: 8; }
      .core { stroke: #0f766e; stroke-width: 2.5; fill: #f0fdfa; }
      .led  { stroke: #1f2937; stroke-width: 2; fill: #fef9c3; }
      .lbl  { fill: #111827; font-size: 14px; font-weight: bold; }
      .port { fill: #0f766e; font-size: 12.5px; font-family: Menlo, Consolas, monospace; font-weight: bold; }
      .pin  { fill: #6b7280; font-size: 11px; font-family: Menlo, Consolas, monospace; }
      .ttl  { fill: #111827; font-size: 17px; font-weight: bold; }
      .sub  { fill: #6b7280; font-size: 12.5px; }
    </style>
  </defs>

  <rect x="1" y="1" width="898" height="558" rx="10" fill="#ffffff" stroke="#d1d5db"/>
  <text class="ttl" x="24" y="32">decoder_bcd — Basys 3 board-level view</text>
  <text class="sub" x="24" y="52">BCD-to-decimal decoder with enable: slide switches in, one-hot LEDs out</text>

  <!-- FPGA outline -->
  <rect class="chip" x="330" y="90" width="290" height="410" rx="8"/>
  <text class="lbl" x="345" y="114">Artix-7 XC7A35T</text>
  <text class="sub" x="345" y="132">xc7a35tcpg236-1</text>

  <!-- decoder core -->
  <rect class="core" x="380" y="145" width="190" height="315" rx="6"/>
  <text class="lbl" x="475" y="484" fill="#0f766e" text-anchor="middle">decoder_bcd</text>

  <!-- switches (left) -->
  <g>
    <rect class="box" x="40" y="153" width="74" height="34" rx="5"/>
    <text class="lbl" x="57" y="175">SW4</text>
    <line class="wire" x1="114" y1="170" x2="380" y2="170"/>
    <text class="pin" x="290" y="164">W15</text>
    <text class="port" x="390" y="174">EN</text>

    <rect class="box" x="40" y="203" width="74" height="34" rx="5"/>
    <text class="lbl" x="57" y="225">SW3</text>
    <line class="wire" x1="114" y1="220" x2="380" y2="220"/>
    <text class="pin" x="290" y="214">W17</text>
    <text class="port" x="390" y="224">B(3)</text>

    <rect class="box" x="40" y="253" width="74" height="34" rx="5"/>
    <text class="lbl" x="57" y="275">SW2</text>
    <line class="wire" x1="114" y1="270" x2="380" y2="270"/>
    <text class="pin" x="290" y="264">W16</text>
    <text class="port" x="390" y="274">B(2)</text>

    <rect class="box" x="40" y="303" width="74" height="34" rx="5"/>
    <text class="lbl" x="57" y="325">SW1</text>
    <line class="wire" x1="114" y1="320" x2="380" y2="320"/>
    <text class="pin" x="290" y="314">V16</text>
    <text class="port" x="390" y="324">B(1)</text>

    <rect class="box" x="40" y="353" width="74" height="34" rx="5"/>
    <text class="lbl" x="57" y="375">SW0</text>
    <line class="wire" x1="114" y1="370" x2="380" y2="370"/>
    <text class="pin" x="290" y="364">V17</text>
    <text class="port" x="390" y="374">B(0)</text>
  </g>

  <!-- LEDs (right): Y0 top .. Y9 bottom -->
  <g>
    <line class="wire" x1="570" y1="160" x2="750" y2="160"/>
    <text class="port" x="520" y="164" text-anchor="end">Y(0)</text>
    <text class="pin" x="660" y="154">U16</text>
    <circle class="led" cx="762" cy="160" r="9"/>
    <text class="lbl" x="780" y="165">LD0</text>

    <line class="wire" x1="570" y1="190" x2="750" y2="190"/>
    <text class="port" x="520" y="194" text-anchor="end">Y(1)</text>
    <text class="pin" x="660" y="184">E19</text>
    <circle class="led" cx="762" cy="190" r="9"/>
    <text class="lbl" x="780" y="195">LD1</text>

    <line class="wire" x1="570" y1="220" x2="750" y2="220"/>
    <text class="port" x="520" y="224" text-anchor="end">Y(2)</text>
    <text class="pin" x="660" y="214">U19</text>
    <circle class="led" cx="762" cy="220" r="9"/>
    <text class="lbl" x="780" y="225">LD2</text>

    <line class="wire" x1="570" y1="250" x2="750" y2="250"/>
    <text class="port" x="520" y="254" text-anchor="end">Y(3)</text>
    <text class="pin" x="660" y="244">V19</text>
    <circle class="led" cx="762" cy="250" r="9"/>
    <text class="lbl" x="780" y="255">LD3</text>

    <line class="wire" x1="570" y1="280" x2="750" y2="280"/>
    <text class="port" x="520" y="284" text-anchor="end">Y(4)</text>
    <text class="pin" x="660" y="274">W18</text>
    <circle class="led" cx="762" cy="280" r="9"/>
    <text class="lbl" x="780" y="285">LD4</text>

    <line class="wire" x1="570" y1="310" x2="750" y2="310"/>
    <text class="port" x="520" y="314" text-anchor="end">Y(5)</text>
    <text class="pin" x="660" y="304">U15</text>
    <circle class="led" cx="762" cy="310" r="9"/>
    <text class="lbl" x="780" y="315">LD5</text>

    <line class="wire" x1="570" y1="340" x2="750" y2="340"/>
    <text class="port" x="520" y="344" text-anchor="end">Y(6)</text>
    <text class="pin" x="660" y="334">U14</text>
    <circle class="led" cx="762" cy="340" r="9"/>
    <text class="lbl" x="780" y="345">LD6</text>

    <line class="wire" x1="570" y1="370" x2="750" y2="370"/>
    <text class="port" x="520" y="374" text-anchor="end">Y(7)</text>
    <text class="pin" x="660" y="364">V14</text>
    <circle class="led" cx="762" cy="370" r="9"/>
    <text class="lbl" x="780" y="375">LD7</text>

    <line class="wire" x1="570" y1="400" x2="750" y2="400"/>
    <text class="port" x="520" y="404" text-anchor="end">Y(8)</text>
    <text class="pin" x="660" y="394">V13</text>
    <circle class="led" cx="762" cy="400" r="9"/>
    <text class="lbl" x="780" y="405">LD8</text>

    <line class="wire" x1="570" y1="430" x2="750" y2="430"/>
    <text class="port" x="520" y="434" text-anchor="end">Y(9)</text>
    <text class="pin" x="660" y="424">V3</text>
    <circle class="led" cx="762" cy="430" r="9"/>
    <text class="lbl" x="780" y="435">LD9</text>
  </g>

  <text class="sub" x="24" y="530">EN = 1 and B = 0–9: exactly one LED lights (one-hot).  EN = 0, or invalid code B = 10–15: all LEDs stay off.</text>
</svg>
